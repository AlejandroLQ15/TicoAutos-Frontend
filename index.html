<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicoAutos - Gestión de vehículos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-inner">
        <a href="index.html" class="app-brand">
          <img src="assets/TicoAutos_Logo.png" alt="TicoAutos" class="app-brand-logo">
        </a>
        <nav class="app-nav" id="appNav">
          <a href="index.html">Inicio</a>
          <a href="pages/registro.html">Registro</a>
          <a href="pages/login.html">Iniciar sesión</a>
        </nav>
      </div>
    </header>

    <main class="app-main">
      <h1 class="page-title">Registro de vehículos</h1>

      <section class="card">
        <h2 class="card-title">Agregar vehículo</h2>
        <form id="autoForm">
          <div class="form-group">
            <label class="form-label" for="marca">Marca</label>
            <input type="text" id="marca" name="marca" class="form-input" placeholder="Ej. Toyota" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="modelo">Modelo</label>
            <input type="text" id="modelo" name="modelo" class="form-input" placeholder="Ej. Corolla" required>
          </div>
          <button type="submit" class="btn btn-primary">Agregar vehículo</button>
        </form>
      </section>

      <section class="card">
        <h2 class="card-title">Vehículos registrados</h2>
        <ul id="autosList" class="autos-list"></ul>
      </section>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('authToken');
      const nav = document.getElementById('appNav');
      if (token) {
        nav.innerHTML = '<a href="index.html">Inicio</a><a href="#" id="logoutLink" class="nav-logout">Cerrar sesión</a>';
        document.getElementById('logoutLink').addEventListener('click', e => {
          e.preventDefault();
          localStorage.removeItem('authToken');
          window.location.reload();
        });
      }
    });
  </script>
</body>
</html>
