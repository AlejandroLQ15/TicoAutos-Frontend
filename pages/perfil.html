<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi perfil - TicoAutos</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/config.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-inner">
        <a href="../index.html" class="app-brand">
          <img src="../assets/TicoAutos_Logo.png" alt="TicoAutos" class="app-brand-logo">
        </a>
        <nav class="app-nav" id="appNav"></nav>
      </div>
    </header>

    <main class="app-main">
      <h1 class="page-title">Mi perfil</h1>
      <p class="section-hint">Tu nombre y foto se muestran en los mensajes con otros usuarios.</p>

      <section class="card">
        <h2 class="card-title">Datos públicos</h2>
        <form id="profileForm">
          <div class="form-group profile-avatar-row">
            <label class="form-label">Foto de perfil</label>
            <div class="profile-avatar-wrap">
              <div id="profileAvatarPreview" class="avatar avatar-preview avatar-initials">--</div>
              <div class="form-group">
                <input type="file" id="foto_perfil" name="foto_perfil" class="form-input" accept="image/jpeg,image/png,image/gif,image/webp">
                <span class="form-hint">JPEG, PNG, GIF o WebP. Máx. 2 MB.</span>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form-input" required placeholder="Tu nombre">
          </div>
          <p id="formFeedback" class="form-feedback" role="alert" aria-live="polite"></p>
          <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </form>
      </section>
    </main>

    <footer class="app-footer">
      <div class="app-footer-inner">
        <p class="app-footer-copy">© 2025 TicoAutos · Programación en Ambiente Web</p>
        <div class="app-footer-links">
          <a href="../index.html">Inicio</a>
          <a href="listado.html">Vehículos</a>
          <a href="inbox.html">Mensajes</a>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // Configuracion base del backend
    const API_BASE = window.APP_CONFIG.API_BASE;
    // Origen del backend para armar URLs completas de imagenes
    const API_ORIGIN = window.APP_CONFIG.API_ORIGIN;
    // Claves para la sesion en localStorage
    const AUTH_TOKEN_KEY = 'authToken';
    const AUTH_USER_KEY = 'authUser';

    document.addEventListener('DOMContentLoaded', () => {
      // 1) Verificamos que el usuario este logueado
      const auth = getAuth();
      if (!auth) {
        window.location.replace('login.html');
        return;
      }
      // 2) Armamos el menu y cargamos los datos del perfil
      setupNav(auth);
      loadProfile(auth);
      // 3) Escuchamos cambios/submit del formulario de perfil
      document.getElementById('profileForm').addEventListener('submit', (e) => submitProfile(e, auth));
      document.getElementById('foto_perfil').addEventListener('change', (e) => previewAvatar(e));
    });

    // Lee token + usuario de localStorage y los valida
    function getAuth() {
      const token = localStorage.getItem(AUTH_TOKEN_KEY);
      const raw = localStorage.getItem(AUTH_USER_KEY);
      if (!token || !raw) return null;
      try {
        const user = JSON.parse(raw);
        return user ? { token, user } : null;
      } catch { return null; }
    }

    function setupNav(auth) {
      const nav = document.getElementById('appNav');
      const logoutIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>';
      nav.innerHTML = '<a href="../index.html">Inicio</a><div class="nav-dropdown"><span class="nav-dropdown-trigger">Vehículos</span><div class="nav-dropdown-menu"><a href="vehiculos.html">Mis vehículos</a><a href="crear-vehiculo.html">Crear vehículo</a><a href="listado.html">Ver listado</a></div></div><a href="inbox.html">Mensajes</a><a href="perfil.html" class="nav-active">Mi perfil</a><a href="#" id="logoutLink" class="nav-logout" title="Cerrar sesión">' + logoutIcon + '</a>';
      document.getElementById('logoutLink').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem(AUTH_TOKEN_KEY);
        localStorage.removeItem(AUTH_USER_KEY);
        window.location.replace('login.html');
      });
    }

    function setFeedback(msg) {
      document.getElementById('formFeedback').textContent = msg || '';
    }

    // Construye la URL de foto: si viene relativa, la juntamos con API_ORIGIN
    function getAvatarUrl(foto) {
      if (!foto || !String(foto).trim()) return '';
      return foto.startsWith('http') ? foto : (API_ORIGIN + (foto.startsWith('/') ? '' : '/') + foto);
    }
    // Iniciales para cuando no hay foto (ej. "JD")
    function getInitials(nombre, username) {
      const n = (nombre || username || 'U').trim();
      const parts = n.split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return (n[0] || 'U').toUpperCase();
    }

    // Actualiza el “preview” de la foto de perfil antes de guardar
    function renderAvatarPreview(url, initials) {
      const el = document.getElementById('profileAvatarPreview');
      if (!el) return;
      el.classList.remove('avatar-initials');
      el.removeAttribute('style');
      if (url) {
        el.style.backgroundImage = `url(${url})`;
        el.style.backgroundSize = 'cover';
        el.textContent = '';
      } else {
        el.classList.add('avatar-initials');
        el.textContent = initials || '--';
      }
    }

    // Cuando eliges un archivo, lo previsualizamos localmente (sin subir aun)
    function previewAvatar(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      renderAvatarPreview(url, '');
    }

    // Carga los datos del usuario desde el backend y precarga el formulario
    async function loadProfile(auth) {
      try {
        const res = await fetch(`${API_BASE}/users/me`, {
          headers: { 'Authorization': `Bearer ${auth.token}` }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || 'Error al cargar perfil');
        const user = data.data || data.user || data;
        document.getElementById('nombre').value = user.nombre || '';
        const url = getAvatarUrl(user.foto_perfil);
        renderAvatarPreview(url, getInitials(user.nombre, user.username));
      } catch (err) {
        setFeedback(err.message || 'No se pudo cargar el perfil.');
      }
    }

    // Envía cambios de perfil (nombre + opcional foto) al backend
    async function submitProfile(e, auth) {
      e.preventDefault();
      setFeedback('');
      const nombre = document.getElementById('nombre').value.trim();
      const fileInput = document.getElementById('foto_perfil');
      const formData = new FormData();
      formData.append('nombre', nombre);
      if (fileInput.files && fileInput.files[0]) formData.append('foto_perfil', fileInput.files[0]);

      try {
        // PATCH para actualizar /users/me con datos multipart/form-data
        const res = await fetch(`${API_BASE}/users/me`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${auth.token}` },
          body: formData
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || 'Error al guardar');
        const updated = data.data || data;
        // Guardamos lo actualizado en localStorage para que se vea inmediato
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify({ id: updated.id, username: updated.username, nombre: updated.nombre, foto_perfil: updated.foto_perfil }));
        renderAvatarPreview(getAvatarUrl(updated.foto_perfil), getInitials(updated.nombre, updated.username));
        setFeedback('Perfil actualizado correctamente.');
        fileInput.value = '';
      } catch (err) {
        setFeedback(err.message || 'Error al guardar perfil.');
      }
    }
  </script>
</body>
</html>
