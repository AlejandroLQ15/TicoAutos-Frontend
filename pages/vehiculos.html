<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>Crear vehículo - TicoAutos</title>

  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-inner">
        <a href="../index.html" class="app-brand">
          <img src="../assets/TicoAutos_Logo.png" alt="TicoAutos" class="app-brand-logo">
        </a>
        <nav class="app-nav" id="appNav">
          <a href="../index.html">Inicio</a>
          <a href="vehiculos.html" class="nav-active">Crear vehículo</a>
          <a href="registro.html">Registro</a>
          <a href="login.html">Iniciar sesión</a>
        </nav>
      </div>
    </header>

    <main class="app-main">
      <h1 class="page-title">Registro de vehículos</h1>

      <section class="card">
        <h2 class="card-title">Agregar vehículo</h2>
        <form id="autoForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="marca">Marca</label>
              <input type="text" id="marca" name="marca" class="form-input" placeholder="Ej. Toyota" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="modelo">Modelo</label>
              <input type="text" id="modelo" name="modelo" class="form-input" placeholder="Ej. Corolla" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="anio">Año</label>
              <input type="number" id="anio" name="anio" class="form-input" placeholder="Ej. 2023" min="1900" max="2100" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="precio">Precio (₡)</label>
              <input type="number" id="precio" name="precio" class="form-input" placeholder="Ej. 15000000" min="0" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="estado">Estado</label>
            <select id="estado" name="estado" class="form-select">
              <option value="disponible">Disponible</option>
              <option value="vendido">Vendido</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Agregar vehículo</button>
        </form>
      </section>

      <section class="card">
        <h2 class="card-title">Vehículos registrados</h2>
        <ul id="autosList" class="autos-list"></ul>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    const AUTH_TOKEN_KEY = 'authToken';
    const AUTH_USER_KEY = 'authUser';

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem(AUTH_TOKEN_KEY);
      const rawUser = localStorage.getItem(AUTH_USER_KEY);
      if (!token || !rawUser) {
        window.location.replace('login.html');
        return;
      }

      let authUser = null;
      try {
        authUser = JSON.parse(rawUser);
      } catch {
        localStorage.removeItem(AUTH_USER_KEY);
        localStorage.removeItem(AUTH_TOKEN_KEY);
        window.location.replace('login.html');
        return;
      }

      if (!authUser || Object.keys(authUser).length === 0) {
        localStorage.removeItem(AUTH_USER_KEY);
        localStorage.removeItem(AUTH_TOKEN_KEY);
        window.location.replace('login.html');
        return;
      }

      const nav = document.getElementById('appNav');
      nav.innerHTML = '<a href="../index.html">Inicio</a><a href="vehiculos.html" class="nav-active">Crear vehículo</a><a href="#" id="logoutLink" class="nav-logout">Cerrar sesión</a>';
        document.getElementById('logoutLink').addEventListener('click', e => {
          e.preventDefault();
          localStorage.removeItem(AUTH_USER_KEY);
          localStorage.removeItem(AUTH_TOKEN_KEY);
          window.location.href = 'login.html';
        });

      cargarAutos();
    });

    async function cargarAutos() {
      const list = document.getElementById('autosList');
      try {
        const resp = await fetch(`${API_BASE}/autos`);
        const result = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          list.innerHTML = '<li class="empty-state">No se pudieron cargar los vehículos.</li>';
          return;
        }
        const autos = result.data || [];
        const authUser = JSON.parse(localStorage.getItem(AUTH_USER_KEY) || '{}');
        if (autos.length === 0) {
          list.innerHTML = '<li class="empty-state">Aún no hay vehículos registrados. Agrega uno arriba.</li>';
          return;
        }
        list.innerHTML = autos.map(auto => {
          const owner = auto.owner_id ? (auto.owner_id.nombre || auto.owner_id.username || '') : '';
          const ownerId = auto.owner_id?._id || auto.owner_id?.id || auto.owner_id;
          const canDelete = Boolean(authUser.id && ownerId && authUser.id === String(ownerId));
          return `<li>
            <span class="auto-info">${escapeHtml(auto.marca)} ${escapeHtml(auto.modelo)}</span>
            <span class="auto-meta">${auto.anio || ''} · ₡${formatNumber(auto.precio)} · ${auto.estado || 'disponible'}${owner ? ' · ' + escapeHtml(owner) : ''}</span>
            ${canDelete ? `<button type="button" class="btn btn-danger btn-sm" onclick="eliminarAuto('${auto._id}')">Eliminar</button>` : ''}
          </li>`;
        }).join('');
      } catch (err) {
        console.error(err);
        list.innerHTML = '<li class="empty-state">Error al cargar. Comprueba que el servidor esté en marcha.</li>';
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function formatNumber(n) {
      if (n == null) return '0';
      return Number(n).toLocaleString('es-CR');
    }

    document.getElementById('autoForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const authToken = localStorage.getItem(AUTH_TOKEN_KEY);
      if (!authToken) {
        alert('Debes iniciar sesión para agregar un vehículo.');
        window.location.href = 'login.html';
        return;
      }
      const payload = {
        marca: document.getElementById('marca').value.trim(),
        modelo: document.getElementById('modelo').value.trim(),
        anio: parseInt(document.getElementById('anio').value, 10),
        precio: parseFloat(document.getElementById('precio').value) || 0,
        estado: document.getElementById('estado').value || 'disponible'
      };
      try {
        const resp = await fetch(`${API_BASE}/autos`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(payload)
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          throw new Error(data.message || 'Error al guardar');
        }
        document.getElementById('autoForm').reset();
        cargarAutos();
      } catch (err) {
        alert(err.message || 'Error al agregar vehículo');
      }
    });

    async function eliminarAuto(autoId) {
      const authToken = localStorage.getItem(AUTH_TOKEN_KEY);
      if (!authToken) {
        alert('Debes iniciar sesión para eliminar un vehículo.');
        window.location.href = 'login.html';
        return;
      }
      if (!confirm('¿Seguro que deseas eliminar este vehículo?')) {
        return;
      }
      try {
        const resp = await fetch(`${API_BASE}/autos/${autoId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          throw new Error(data.message || 'No se pudo eliminar el vehículo');
        }
        cargarAutos();
      } catch (err) {
        alert(err.message || 'Error al eliminar vehículo');
      }
    }

    window.eliminarAuto = eliminarAuto;
  </script>
</body>
</html>
