<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - TicoAutos</title>
  <link rel="stylesheet" href="registro.css">
</head>
<body>
  <div class="container">
    <h1>Registro de usuario</h1>
    <form id="registroForm">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" required>

      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" name="contrasena" required>

      <input type="submit" value="Crear cuenta">
    </form>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </div>

  <script>
    // La URL deberá coincidir con el endpoint del backend
    const REGISTER_URL = 'http://localhost:3000/api/users/register';

    document.getElementById('registroForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const nombre = document.getElementById('nombre').value.trim();
      const usuario = document.getElementById('usuario').value.trim();
      const contrasena = document.getElementById('contrasena').value;

      if (!nombre || !usuario || !contrasena) {
        alert('Por favor completa todos los campos.');
        return;
      }

      try {
        const resp = await fetch(REGISTER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, username: usuario, password: contrasena }),
        });
        if (!resp.ok) {
          const errData = await resp.json().catch(() => null);
          throw new Error(errData?.message || 'Error en registro');
        }
        alert('Registro exitoso, por favor inicia sesión.');
        window.location.href = 'login.html';
      } catch (err) {
        console.error('Error en registro', err);
        alert('Hubo un error al registrar: ' + err.message);
      }
    });
  </script>
</body>
</html>
